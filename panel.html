<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administracji | VAST</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; padding: 50px; }
        .panel-container { max-width: 800px; margin: 0 auto; }
        .faction-row { 
            display: flex; justify-content: space-between; align-items: center;
            background: #151515; padding: 20px; border-radius: 12px; margin-bottom: 10px;
            border-left: 4px solid var(--fc); 
        }
        .btn-toggle { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .status-on { background: #27ae60; color: white; }
        .status-off { background: #c0392b; color: white; }
    </style>
</head>
<body>

<div class="panel-container">
    <h1>Zarządzanie Rekrutacją</h1>
    <div id="panel-list"></div>
    <a href="index.html" class="nav-btn" style="display:inline-block; margin-top:20px;">Powrót na stronę</a>
</div>

<script src="js/data.js"></script>
<script>
    // Sprawdzenie dostępu po załadowaniu
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user || !CONFIG.admins[user.id]) {
        window.location.href = "index.html";
    }

    function renderPanel() {
        const list = document.getElementById("panel-list");
        list.innerHTML = "";
        
        CONFIG.factions.forEach(f => {
            // Sprawdzenie czy użytkownik ma uprawnienia do tej frakcji (lub jest adminem)
            const isAdmin = CONFIG.admins[user.id].role === 'admin';
            const isAuthorized = isAdmin || CONFIG.admins[user.id].role === f.key;

            if (isAuthorized) {
                const div = document.createElement("div");
                div.className = "faction-row";
                div.style.setProperty("--fc", f.color);
                div.innerHTML = `
                    <div><h3>${f.name}</h3><p>Status: ${f.status ? 'OTWARTE' : 'ZAMKNIĘTE'}</p></div>
                    <button class="btn-toggle ${f.status ? 'status-on' : 'status-off'}" 
                            onclick="toggleStatus('${f.key}')">
                        ${f.status ? 'ZAMKNIJ' : 'OTWÓRZ'}
                    </button>
                `;
                list.appendChild(div);
            }
        });
    }

    function toggleStatus(key) {
        const faction = CONFIG.factions.find(f => f.key === key);
        faction.status = !faction.status;
        renderPanel();
        // Tutaj docelowo dodasz zapis do bazy danych (np. fetch do serwera)
        console.log(`Zmieniono status ${key} na ${faction.status}`);
    }

    renderPanel();
</script>
</body>
</html>
